name: Publish Python package to PyPI

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump patch version
        id: bump
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$', text, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find a SemVer version in pyproject.toml")

          major, minor, patch = map(int, match.groups())
          new_version = f"{major}.{minor}.{patch + 1}"
          updated = re.sub(
              r'^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
              f'version = "{new_version}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(updated, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"new_version={new_version}\n")

          print(f"Bumped version to {new_version}")
          PY

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true